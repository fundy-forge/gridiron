<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gridiron Brewing — Account Setup</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      body { margin: 0; background: #211711; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #faf3e4; }
      p { text-align: center; opacity: 0.6; font-size: 14px; }
    </style>
  </head>
  <body>
    <p>Setting up your account…</p>
    <script>
      netlifyIdentity.init();
      netlifyIdentity.open();
      netlifyIdentity.on('login', () => {
        window.location.href = '/admin/';
      });
    </script>
  </body>
</html>
